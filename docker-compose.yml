version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: user-booking-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: howpathetic1
      MYSQL_DATABASE: user-booking
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: user-booking-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: "howpathetic1"  
    depends_on:
      - db

  cache:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always

volumes:
  db_data: